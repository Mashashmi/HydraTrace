<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydraTrace | Oil Consumption Analytics</title>

    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for compiling JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Recharts dependencies -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
    
    <!-- Recharts (Pinned to stable UMD version) -->
    <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { margin: 0; padding: 0; background-color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, 
            Legend, ResponsiveContainer, PieChart, Pie, Cell, LineChart, Line, ComposedChart
        } = window.Recharts;

        // Configuration: Change this to your live server URL once deployed (e.g., https://my-hydratrace-backend.onrender.com/api/data)
        const API_URL = 'http://127.0.0.1:5000/api/data';

        const IconDroplet = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"></path></svg>);
        const IconDashboard = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>);
        const IconSettings = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>);
        const IconPlus = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>);
        const IconTrending = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>);
        const IconLineChart = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 3 3 21 21 21"></polyline><polyline points="3 14 8 9 13 14 21 6"></polyline></svg>);
        const IconTable = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="9" x2="9" y2="21"></line><line x1="15" y1="9" x2="15" y2="21"></line></svg>);
        const IconTrash = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>);
        const IconEdit = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>);
        const IconDownload = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>);
        const IconCalendar = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>);
        const IconActivity = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>);
        const IconInventory = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>);
        const IconWarning = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>);
        const IconTruck = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>);
        const IconCloud = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>);

        const PLANT_HIERARCHY = {
            "AP3": [
                "Entry Power Pack", "Shear Welder Power Pack", "Steering#1,2&3 Power Pack", 
                "Steering#4 Power Pack", "Scale Breaker Power Pack", "Steering#4A Power Pack", 
                "Steering#5 Power Pack", "Edge Guide Power Pack", "Exit Power Pack"
            ],
            "CP1": ["Aux Power Pack", "Edge Guide Power Pack"],
            "CP2": ["CPC Power Pack (Uncoiler)", "Aux Power Pack", "Edge Guide Power Pack (Recoiler)"],
            "CP3": ["Aux Power Pack"]
        };

        const COLORS = { "AP3": "#3b82f6", "CP1": "#10b981", "CP2": "#f59e0b", "CP3": "#8b5cf6", "Other": "#64748b" };

        const INITIAL_RECORDS = [];
        const DEFAULT_INVENTORY = { currentStock: 1500, safetyStock: 300 };

        function App() {
            const [activeTab, setActiveTab] = useState('overview');
            const [selectedLine, setSelectedLine] = useState('AP3');
            const [selectedMonth, setSelectedMonth] = useState('All');
            const [editingId, setEditingId] = useState(null);
            const [trendPack, setTrendPack] = useState(PLANT_HIERARCHY['AP3'][0]);
            
            // Server Sync Status
            const [syncStatus, setSyncStatus] = useState('connecting'); // connecting, synced, error

            // Core Data State
            const [records, setRecords] = useState(INITIAL_RECORDS);
            const [inventoryState, setInventoryState] = useState(DEFAULT_INVENTORY);
            const [inventoryLogs, setInventoryLogs] = useState([]);

            // Fetch initial data from server on load
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch(API_URL);
                        if (!response.ok) throw new Error('Network response was not ok');
                        const data = await response.json();
                        
                        setRecords(data.records || INITIAL_RECORDS);
                        setInventoryState(data.inventoryState || DEFAULT_INVENTORY);
                        setInventoryLogs(data.inventoryLogs || []);
                        setSyncStatus('synced');
                    } catch (error) {
                        console.error('Failed to fetch from backend, falling back to empty state:', error);
                        setSyncStatus('error');
                    }
                };
                fetchData();
            }, []);

            // Function to push updates to the server
            const saveToServer = async (newRecords, newInventoryState, newInventoryLogs) => {
                setSyncStatus('connecting');
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            records: newRecords,
                            inventoryState: newInventoryState,
                            inventoryLogs: newInventoryLogs
                        })
                    });
                    if (!response.ok) throw new Error('Failed to save');
                    setSyncStatus('synced');
                } catch (error) {
                    console.error('Error saving data to backend:', error);
                    setSyncStatus('error');
                    // Fallback to local storage if server is down so data isn't completely lost
                    localStorage.setItem('hydraTrace_offline_backup', JSON.stringify({newRecords, newInventoryState, newInventoryLogs}));
                }
            };

            // Keep trendPack valid when line changes
            useEffect(() => {
                if (!PLANT_HIERARCHY[selectedLine].includes(trendPack)) {
                    setTrendPack(PLANT_HIERARCHY[selectedLine][0]);
                }
            }, [selectedLine]);

            const getTodayDate = () => new Date().toISOString().split('T')[0];

            const defaultFormState = {
                date: getTodayDate(), shift: 'General', line: 'AP3', powerPack: PLANT_HIERARCHY['AP3'][0], tankLevel: '', amount: '', person: ''
            };
            const [formData, setFormData] = useState(defaultFormState);

            const availableMonths = useMemo(() => {
                const months = new Set(
                    records.filter(r => r && typeof r.date === 'string' && r.date.length >= 7)
                           .map(r => r.date.substring(0, 7))
                ); 
                return Array.from(months).sort().reverse();
            }, [records]);

            // Apply the month filter
            const filteredRecords = useMemo(() => {
                if (selectedMonth === 'All') return records;
                return records.filter(r => r && typeof r.date === 'string' && r.date.startsWith(selectedMonth));
            }, [records, selectedMonth]);

            // Metrics Calculations
            const totalConsumption = filteredRecords.reduce((sum, r) => sum + (Number(r.amount) || 0), 0);
            
            const consumptionByLine = useMemo(() => {
                const data = { AP3: 0, CP1: 0, CP2: 0, CP3: 0 };
                filteredRecords.forEach(r => { if (data[r.line] !== undefined) data[r.line] += (Number(r.amount) || 0); });
                return Object.keys(data).map(key => ({ name: key, value: data[key] })).filter(d => d.value > 0);
            }, [filteredRecords]);

            const powerPackRankings = useMemo(() => {
                const packs = {};
                filteredRecords.forEach(r => {
                    const key = `${r.line} - ${r.powerPack}`;
                    packs[key] = (packs[key] || 0) + (Number(r.amount) || 0);
                });
                return Object.keys(packs).map(key => ({ name: key, amount: packs[key] })).sort((a, b) => b.amount - a.amount);
            }, [filteredRecords]);

            const linePacksData = useMemo(() => {
                const packs = PLANT_HIERARCHY[selectedLine] || [];
                return packs.map(pack => {
                    const amount = filteredRecords
                        .filter(r => r.line === selectedLine && r.powerPack === pack)
                        .reduce((sum, r) => sum + (Number(r.amount) || 0), 0);
                    return { name: pack, amount };
                });
            }, [filteredRecords, selectedLine]);

            const singlePackTrendData = useMemo(() => {
                const packRecords = filteredRecords
                    .filter(r => r.line === selectedLine && r.powerPack === trendPack)
                    .sort((a, b) => new Date(a.date) - new Date(b.date));
                
                return packRecords.map(r => ({
                    date: r.date,
                    amount: Number(r.amount) || 0,
                    tankLevel: Number(r.tankLevel) || 0
                }));
            }, [filteredRecords, selectedLine, trendPack]);

            const inventoryMetrics = useMemo(() => {
                const today = new Date();
                let dailyAvg = 5; // Default fallback
                
                if (records.length > 0) {
                    const sortedDates = [...records].map(r => new Date(r.date)).sort((a,b) => a-b);
                    const firstDate = sortedDates[0];
                    const lastDate = sortedDates[sortedDates.length - 1];
                    let daysDiff = Math.ceil(Math.abs(lastDate - firstDate) / (1000 * 60 * 60 * 24));
                    daysDiff = daysDiff === 0 ? 1 : daysDiff; 
                    
                    const totalVol = records.reduce((sum, r) => sum + (Number(r.amount) || 0), 0);
                    dailyAvg = totalVol / daysDiff;
                    if (dailyAvg === 0) dailyAvg = 5;
                }

                const daysRemaining = Math.max(0, Math.floor(inventoryState.currentStock / dailyAvg));
                const depletionDate = new Date(today);
                depletionDate.setDate(depletionDate.getDate() + daysRemaining);
                
                const forecastData = [];
                let simulatedStock = inventoryState.currentStock;
                for(let i=0; i<=30; i++) {
                    const fDate = new Date(today);
                    fDate.setDate(fDate.getDate() + i);
                    forecastData.push({
                        date: fDate.toLocaleDateString('en-US', {month: 'short', day: 'numeric'}),
                        projectedStock: Math.max(0, Math.round(simulatedStock)),
                        safetyLimit: inventoryState.safetyStock
                    });
                    simulatedStock -= dailyAvg;
                }
                
                return {
                    dailyAvg: dailyAvg.toFixed(1),
                    daysRemaining,
                    depletionDate: isNaN(depletionDate.getTime()) ? 'Unknown' : depletionDate.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'}),
                    forecastData,
                    status: daysRemaining < 10 ? 'CRITICAL' : daysRemaining < 30 ? 'WARNING' : 'HEALTHY',
                    colorClass: daysRemaining < 10 ? 'text-red-600' : daysRemaining < 30 ? 'text-amber-600' : 'text-emerald-600',
                    bgClass: daysRemaining < 10 ? 'bg-red-50' : daysRemaining < 30 ? 'bg-amber-50' : 'bg-emerald-50'
                };
            }, [records, inventoryState]);

            const handleFormChange = (e) => {
                const { name, value } = e.target;
                if (name === 'line') {
                    setFormData({ ...formData, line: value, powerPack: (PLANT_HIERARCHY[value] || [])[0] });
                } else {
                    setFormData({ ...formData, [name]: value });
                }
            };

            const handleSubmitRecord = (e) => {
                e.preventDefault();
                const amt = parseFloat(formData.amount);
                if (isNaN(amt)) return;
                
                let updatedRecords;
                let updatedInventory = { ...inventoryState };

                if (editingId) {
                    updatedRecords = records.map(r => r.id === editingId ? { ...formData, amount: amt, tankLevel: parseFloat(formData.tankLevel)||0, id: editingId } : r);
                    setEditingId(null);
                } else {
                    const newRecord = {
                        ...formData,
                        id: Date.now().toString(),
                        amount: amt,
                        tankLevel: parseFloat(formData.tankLevel)||0,
                        person: formData.person || 'Unknown',
                        shift: formData.shift || 'General'
                    };
                    updatedRecords = [...records, newRecord];
                    // Automatically deduct from inventory
                    updatedInventory.currentStock = Math.max(0, inventoryState.currentStock - amt);
                }
                
                setRecords(updatedRecords);
                setInventoryState(updatedInventory);
                saveToServer(updatedRecords, updatedInventory, inventoryLogs);
                setFormData({ ...formData, amount: '', tankLevel: '', person: '' }); 
            };

            const handleEdit = (record) => {
                setEditingId(record.id);
                setFormData({
                    date: record.date, shift: record.shift || 'General', line: record.line,
                    powerPack: record.powerPack, tankLevel: (record.tankLevel||'').toString(),
                    amount: record.amount.toString(), person: record.person
                });
                setActiveTab('manage-data');
                window.scrollTo(0, 0);
            };

            const cancelEdit = () => { setEditingId(null); setFormData(defaultFormState); };

            const handleDelete = (id) => {
                const updatedRecords = records.filter(r => r.id !== id);
                setRecords(updatedRecords);
                saveToServer(updatedRecords, inventoryState, inventoryLogs);
                if (editingId === id) cancelEdit();
            };

            const handleUpdateInventory = (e) => {
                e.preventDefault();
                const newStock = parseFloat(e.target.currentStock.value);
                const newSafety = parseFloat(e.target.safetyStock.value);
                if(!isNaN(newStock) && !isNaN(newSafety)) {
                    const updatedInventory = { currentStock: newStock, safetyStock: newSafety };
                    setInventoryState(updatedInventory);
                    saveToServer(records, updatedInventory, inventoryLogs);
                }
            };

            const handleReceiveOil = (e) => {
                e.preventDefault();
                const amount = parseFloat(e.target.receiveAmount.value);
                const date = e.target.receiveDate.value;
                const reference = e.target.receiveRef.value;
                
                if(!isNaN(amount) && amount > 0) {
                    const newLog = {
                        id: Date.now().toString(),
                        date, amount, reference: reference || 'Stock Replenishment'
                    };
                    const updatedLogs = [newLog, ...inventoryLogs];
                    const updatedInventory = { ...inventoryState, currentStock: inventoryState.currentStock + amount };
                    
                    setInventoryLogs(updatedLogs);
                    setInventoryState(updatedInventory);
                    saveToServer(records, updatedInventory, updatedLogs);
                    
                    e.target.reset();
                    e.target.receiveDate.value = getTodayDate();
                }
            };

            const handleDeleteReceipt = (log) => {
                const updatedLogs = inventoryLogs.filter(l => l.id !== log.id);
                const updatedInventory = { ...inventoryState, currentStock: Math.max(0, inventoryState.currentStock - log.amount) };
                
                setInventoryLogs(updatedLogs);
                setInventoryState(updatedInventory);
                saveToServer(records, updatedInventory, updatedLogs);
            };

            const exportToCSV = () => {
                if (records.length === 0) return;
                const headers = ['ID', 'Date', 'Shift', 'Line', 'Power Pack', 'Tank Level', 'Liters Amount', 'Personnel'];
                const csvRows = [headers.join(',')];
                records.forEach(r => {
                    const row = [r.id, r.date, `"${r.shift || 'General'}"`, r.line, `"${r.powerPack}"`, r.tankLevel||0, r.amount, `"${r.person}"`];
                    csvRows.push(row.join(','));
                });
                const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.setAttribute('hidden', '');
                a.setAttribute('href', url);
                a.setAttribute('download', `HydraTrace_Data_Export_${getTodayDate()}.csv`);
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            const KPICard = ({ title, value, unit, icon: Icon, colorClass }) => (
                <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-100 flex items-center justify-between">
                    <div>
                        <p className="text-sm font-medium text-slate-500 mb-1">{title}</p>
                        <div className="flex items-baseline gap-1">
                            <h3 className={`text-3xl font-bold ${colorClass}`}>{value}</h3>
                            <span className="text-sm font-semibold text-slate-400">{unit}</span>
                        </div>
                    </div>
                    <div className={`p-3 rounded-lg bg-slate-50 text-slate-400`}><Icon size={24} /></div>
                </div>
            );

            const formatMonth = (monthString) => {
                if (!monthString || monthString === 'All') return 'All Time';
                try {
                    const parts = monthString.split('-');
                    if (parts.length !== 2) return monthString;
                    const dateObj = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1);
                    return dateObj.toLocaleString('default', { month: 'long', year: 'numeric' });
                } catch (error) { return monthString; }
            };

            return (

                                                )}
                                            </div>

                                            <form onSubmit={handleSubmitRecord} className="space-y-4">
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">Date</label>
                                                    <input type="date" name="date" value={formData.date} onChange={handleFormChange} required className="w-full p-2 border border-slate-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none" />
                                                </div>

                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">Shift</label>
                                                    <select name="shift" value={formData.shift} onChange={handleFormChange} className="w-full p-2 border border-slate-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none">
                                                        <option value="General">General Shift</option>
                                                        <option value="Shift A">Shift A (Morning)</option>
                                                        <option value="Shift B">Shift B (Evening)</option>
                                                        <option value="Shift C">Shift C (Night)</option>
                                                    </select>
                                                </div>
                                                
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">Line</label>
                                                    <select name="line" value={formData.line} onChange={handleFormChange} className="w-full p-2 border border-slate-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none">
                                                        {Object.keys(PLANT_HIERARCHY).map(line => <option key={line} value={line}>{line}</option>)}
                                                    </select>
                                                </div>

                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">Power Pack</label>
                                                    <select name="powerPack" value={formData.powerPack} onChange={handleFormChange} className="w-full p-2 border border-slate-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none">
                                                        {(PLANT_HIERARCHY[formData.line] || []).map(pack => <option key={pack} value={pack}>{pack}</option>)}
                                                    </select>
                                                </div>

                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="block text-sm font-medium text-slate-700 mb-1">Tank Level</label>
                                                        <input type="number" name="tankLevel" value={formData.tankLevel} onChange={handleFormChange} placeholder="e.g. 80" className="w-full p-2 border border-slate-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none" />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-medium text-slate-700 mb-1">Amount Added (L)</label>
                                                        <input type="number" name="amount" value={formData.amount} onChange={handleFormChange} required min="1" step="0.1" placeholder="e.g. 40" className="w-full p-2 border border-slate-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none" />
                                                    </div>
                                                </div>

                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">Personnel / Reason</label>
                                                    <input type="text" name="person" value={formData.person} onChange={handleFormChange} placeholder="e.g. Sanjay Rohilla" className="w-full p-2 border border-slate-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none" />
                                                </div>

                                                <button type="submit" className={`w-full text-white font-medium py-2.5 px-4 rounded-md transition-colors mt-4 ${editingId ? 'bg-amber-500 hover:bg-amber-600' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                                    {editingId ? 'Update Record' : 'Save Record'}
                                                </button>
                                            </form>
                                        </div>

                                        <div className="xl:col-span-2 space-y-6">
                                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                                <div className="flex justify-between items-center mb-4">
                                                    <h3 className="text-lg font-bold text-slate-800">
                                                        Top-up Logs <span className="text-sm font-normal text-slate-500">({formatMonth(selectedMonth)})</span>
                                                    </h3>
                                                    <div className="text-sm text-slate-500">Total: {filteredRecords.length} records</div>
                                                </div>
                                                
                                                <div className="overflow-x-auto rounded-lg border border-slate-200 max-h-[600px]">
                                                    <table className="w-full text-left border-collapse">
                                                        <thead className="bg-slate-50 sticky top-0 z-10">
                                                            <tr className="text-slate-500 text-sm border-b border-slate-200 shadow-sm">
                                                                <th className="p-3 font-medium">Date</th>
                                                                <th className="p-3 font-medium">Shift</th>
                                                                <th className="p-3 font-medium">Line</th>
                                                                <th className="p-3 font-medium">Power Pack</th>
                                                                <th className="p-3 font-medium">Level</th>
                                                                <th className="p-3 font-medium">Liters</th>
                                                                <th className="p-3 font-medium text-center">Actions</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {[...filteredRecords].sort((a,b) => new Date(b.date) - new Date(a.date)).map(record => (
                                                                <tr key={record.id} className={`border-b border-slate-100 hover:bg-slate-50 transition-colors ${editingId === record.id ? 'bg-amber-50' : ''}`}>
                                                                    <td className="p-3 text-sm text-slate-700 whitespace-nowrap">{record.date}</td>
                                                                    <td className="p-3 text-sm text-slate-600">{record.shift || 'General'}</td>
                                                                    <td className="p-3">
                                                                        <span className="px-2 py-1 text-xs font-medium rounded-md" style={{backgroundColor: `${COLORS[record.line]}20`, color: COLORS[record.line]}}>
                                                                            {record.line}
                                                                        </span>
                                                                    </td>
                                                                    <td className="p-3 text-sm text-slate-700">{record.powerPack}</td>
                                                                    <td className="p-3 text-sm text-slate-600">{record.tankLevel ? record.tankLevel : '--'}</td>
                                                                    <td className="p-3 text-sm font-semibold text-slate-800">{record.amount} L</td>
                                                                    <td className="p-3 text-center">
                                                                        <div className="flex items-center justify-center gap-3">
                                                                            <button onClick={() => handleEdit(record)} className="text-slate-400 hover:text-blue-500 transition-colors" title="Edit Record"><IconEdit size={16} /></button>
                                                                            <button onClick={() => handleDelete(record.id)} className="text-slate-400 hover:text-red-500 transition-colors" title="Delete Record"><IconTrash size={16} /></button>
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                            {filteredRecords.length === 0 && (
                                                                <tr><td colSpan="7" className="p-8 text-center text-slate-500 text-sm">No records found for this period.</td></tr>
                                                            )}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
